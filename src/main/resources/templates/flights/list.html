<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Flights</title>
</head>
<body>
<h1>All Flights</h1>
<a href="/flights/add">Add Flight</a>
<table>
    <tr>
        <th>ID</th>
        <th>Origin</th>
        <th>Destination</th>
        <th>Departure</th>
        <th>Arrival</th>
        <th>Price</th>
        <th>Seats</th>
    </tr>
    <tr th:each="flight : ${flights}">
        <td th:text="${flight.id}"></td>
        <td th:text="${flight.origin}"></td>
        <td th:text="${flight.destination}"></td>
        <td th:text="${flight.departure}"></td>
        <td th:text="${flight.arrival}"></td>
        <td th:text="${flight.price}"></td>
        <td th:text="${flight.availableSeats}"></td>
        <td>
        <!-- Update -->
        <a th:href="@{'/flights/edit/' + ${flight.id}}">Update</a>

        <!-- Delete -->
        <form th:action="@{'/flights/delete/' + ${flight.id}}" method="post" style="display:inline;">
            <button type="submit" onclick="return confirm('Are you sure you want to delete this flight?');">
                Delete
            </button>
        </form>
        </td>
    </tr>
</table>
</body>
<a href="/">Back to home page</a>

</html>
