<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All reservations</title>
</head>
<body>
<h1>All reservations</h1>

<a href="/bookings/add">Add reservation</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>User</th>
        <th>Flight</th>
        <th>Hotel</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="booking : ${bookings}">
        <td th:text="${booking.id}">1</td>
        <td th:text="${booking.user.name}">User</td>
        <td th:text="${booking.flight.origin + ' -> ' + booking.flight.destination}">Flight</td>
        <td th:text="${booking.hotel.name + ' (' + booking.hotel.city + ')'}">Hotel</td>
        <td>
            <!-- Update -->
            <a th:href="@{'/bookings/edit/' + ${booking.id}}">Update</a>

            <!-- Delete -->
            <form th:action="@{'/bookings/delete/' + ${booking.id}}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Are you sure you want to delete this booking?');">
                    Delete
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<a href="/">Back to home page</a>

</body>
</html>
