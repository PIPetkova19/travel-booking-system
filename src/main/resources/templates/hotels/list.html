<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Hotels</title>
</head>
<body>
<h1>All Hotels</h1>
<a href="/hotels/add">Add Hotel</a>
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>City</th>
        <th>Country</th>
        <th>Price per night</th>
        <th>Available rooms</th>
    </tr>
    <tr th:each="hotel : ${hotels}">
        <td th:text="${hotel.id}"></td>
        <td th:text="${hotel.name}"></td>
        <td th:text="${hotel.city}"></td>
        <td th:text="${hotel.country}"></td>
        <td th:text="${hotel.pricePerNight}"></td>
        <td th:text="${hotel.availableRooms}"></td>
        <td>
            <!-- Update -->
            <a th:href="@{'/hotels/edit/' + ${hotel.id}}">Update</a>

            <!-- Delete -->
            <form th:action="@{'/hotels/delete/' + ${hotel.id}}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Are you sure you want to delete this hotel?');">
                    Delete
                </button>
            </form>
        </td>
    </tr>

</table>
<a href="/">Back to home page</a>

</body>
</html>
